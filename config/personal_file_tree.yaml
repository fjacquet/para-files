# personal_file_tree.yaml
# Configuration technique pour para-files
# Classification sémantique déléguée à config/documents.json et config/thema.json
#
# Version 2.0 - Simplified (2025-12-28)

version: "2.0"
generated: "2025-12-28"

# =============================================================================
# CONFIGURATION
# App settings - can be overridden by environment variables (PARA_FILES_*)
# =============================================================================
config:
  # Root directory for PARA folders (0_Inbox, 1_Projects, etc.)
  para_root: "~/OneDrive - Home/PARA"

  # Number of characters to extract for semantic matching
  content_preview_chars: 2000

  # Taxonomy sources (new in v2.0)
  taxonomy:
    documents_path: "config/documents.json"
    thema_path: "config/thema.json"

  # MLX settings (all models via mlx-lm, no external server needed)
  mlx:
    # Embedding model for semantic matching
    embedding_model: "nomic-text-v1.5"
    score_threshold: 0.75

    # LLM fallback (native MLX, no Ollama required)
    llm_enabled: false
    llm_model: "mlx-community/Qwen2.5-1.5B-Instruct-4bit"
    llm_confidence: 0.6

# mlx-community/phi-4-4bit (Très bon modèle généraliste, mais moins performant que les suivants)
# mlx-community/Qwen2.5-1.5B-Instruct-4bit" (Bon modèle généraliste, léger et rapide)
# mlx-community/Llama-3.1-8B-Instruct-4bit (Le plus populaire, excellent partout)
# mlx-community/Mistral-7B-Instruct-v0.3-4bit (Très fiable, une valeur sûre)
# mlx-community/gemma-2-9b-it-4bit (Le modèle de Google, excellent en français et rédaction)
# mlx-community/Qwen2.5-Coder-7B-Instruct-4bit (Actuellement le roi du code en petite taille)
# mlx-community/DeepSeek-Coder-V2-Lite-Instruct-4bit (Excellent pour le Python et le Web)

# =============================================================================
# ROUTING RULES - Technical patterns by extension/filename
# Documents classification is now in config/documents.json
# =============================================================================
routing_rules:
  # Photos - Route by EXIF date and GPS location
  photos:
    source: "0_Inbox"
    extensions:
      [".jpg", ".jpeg", ".png", ".heic", ".raw", ".cr2", ".nef", ".dng"]
    destination: "4_Archives/photos/{YYYY}/{country}/{location}/{MM}/{DD}"
    date_source: "exif"
    fallback_date: "file_modified"

  # Videos - Route by EXIF date and GPS location
  videos:
    source: "0_Inbox"
    extensions: [".mp4", ".mov", ".avi", ".mkv"]
    destination: "4_Archives/videos/{YYYY}/{country}/{location}/{MM}/{DD}"
    date_source: "exif"
    fallback_date: "file_modified"

  # Screenshots - Route by file date
  screenshots:
    source: "0_Inbox"
    patterns: ["Screenshot*", "Capture*", "Screen Shot*"]
    destination: "4_Archives/photos/{YYYY}/{MM}/{DD}"
    date_source: "file_modified"

  # Online courses - Preserve platform structure
  courses:
    action: "preserve_structure"
    destination: "4_Archives/courses-completed/{platform}"
    platforms:
      coursera: ["*[Cc]oursera*"]
      linkedin-learning: ["*[Ll]inked[Ii]n*[Ll]earning*"]
      oreilly: ["*[Oo][Rr]eilly*"]
      udemy: ["*[Uu]demy*"]
      pluralsight: ["*[Pp]luralsight*"]
      datacamp: ["*[Dd]atacamp*"]

  # Generic folders - Flatten to inbox
  generic_folders:
    patterns: ["New Folder*", "Untitled*", "Sans titre*"]
    action: "flatten_to_inbox"

  # Programs and installers
  programmes:
    extensions:
      [
        ".exe",
        ".msi",
        ".dmg",
        ".pkg",
        ".app",
        ".deb",
        ".rpm",
        ".appimage",
        ".snap",
        ".flatpak",
        ".jar",
        ".war",
        ".apk",
        ".ipa",
      ]
    destination: "4_Archives/programmes"

  # Disk images
  isos:
    extensions:
      [
        ".iso",
        ".img",
        ".bin",
        ".cue",
        ".nrg",
        ".mdf",
        ".vhd",
        ".vhdx",
        ".vmdk",
        ".qcow2",
      ]
    destination: "4_Archives/isos"

  # Presentations (not invoices)
  presentations:
    extensions: [".pptx", ".ppt", ".key", ".odp"]
    destination: "3_Resources/documentation/presentations/{YYYY}"
    date_source: "file_modified"

  # Ebooks - Route to livres (Thema classification via thema.json)
  ebooks:
    extensions: [".epub", ".mobi", ".azw", ".azw3"]
    destination: "3_Resources/livres/{YYYY}"
    date_source: "file_modified"

  # Dell-EMC technical documentation
  dell_emc_documentation:
    patterns:
      [
        "H[0-9]*_*",
        "*[Dd]ell*",
        "*[Pp]ower[Ff]lex*",
        "*[Pp]ower[Ss]tore*",
        "*[Pp]ower[Ss]cale*",
        "*[Vv]x[Rr]ail*",
        "*PFMP*",
        "*[Ii]silon*",
        "*[Uu]nity*",
        "*[Dd]ata[Dd]omain*",
      ]
    extensions: [".pdf", ".pptx", ".ppt", ".docx", ".doc"]
    destination: "3_Resources/docs/Dell-EMC/{technology}"
    date_source: "file_modified"
    known_technologies:
      [
        MariaDB,
        MySQL,
        Oracle,
        PostgreSQL,
        Kubernetes,
        OpenShift,
        EKS,
        VMware,
        vSphere,
        GPU,
        NVIDIA,
        Tanzu,
        Containers,
      ]

  # Security documentation
  security_documentation:
    patterns:
      [
        "*[Pp]olic*",
        "*[Ss]ecur*",
        "*[Cc]ompliance*",
        "*[Ss]tandard*",
        "*NIST*",
        "*ISO*27001*",
        "*SOC*2*",
        "*GDPR*",
        "*PCI*DSS*",
      ]
    extensions: [".pdf", ".docx", ".doc", ".pptx"]
    destination: "3_Resources/docs/Security"
    date_source: "file_modified"

  # VMware documentation
  vmware_documentation:
    patterns: ["*VMware*", "*vSphere*", "*vSAN*", "*NSX*", "*Tanzu*", "*VCF*"]
    extensions: [".pdf", ".pptx", ".ppt", ".docx", ".doc"]
    destination: "3_Resources/documentation/VMware/{YYYY}"
    date_source: "file_modified"

  # Training certificates (professional/IT certifications only)
  certificates:
    patterns:
      [
        "*[Cc]ertificate*of*",
        "*[Cc]ompletion*",
        "*[Bb]adge*",
        "*[Cc]redential*",
        "*[Ss]pecialist*",
        "*[Cc]ertified*",
        "EMC *[Cc]ertif*",
        "EMC *[Tt]rain*",
        "Oracle *[Cc]ertif*",
        "VMware *[Cc]ertif*",
        "Cisco *[Cc]ertif*",
        "Microsoft *[Cc]ertif*",
        "AWS *[Cc]ertif*",
        "VTSP*",
        "VCP*",
        "VCA*",
        "VCIX*",
        "FalconStor *[Tt]rain*",
        "*_training*",
        "*formation*professionnelle*",
      ]
    extensions: [".pdf", ".png", ".jpg"]
    destination: "3_Resources/certifications/{YYYY}"
    date_source: "filename"

  # Professional conferences and events
  conferences:
    patterns:
      [
        "*[Ww]orld*[Rr]egistration*",
        "*[Ww]orld*[Cc]onfirmation*",
        "*[Cc]onference*[Rr]egistration*",
        "*[Ss]ummit*[Rr]egistration*",
        "*[Ee]vent*[Rr]egistration*",
      ]
    extensions: [".pdf"]
    destination: "4_Archives/formations/conferences/{YYYY}"
    date_source: "filename"

  # Exam preparation files
  exam_prep:
    extensions: [".vce", ".exam"]
    destination: "3_Resources/certifications/exam-prep"

  # Software licenses
  software_licenses:
    extensions: [".lic", ".license", ".key"]
    destination: "3_Resources/licences/{YYYY}"
    date_source: "file_modified"

  # Financial transactions CSV
  transactions_csv:
    patterns:
      ["*[Tt]ransaction*", "*[Rr]elevé*", "*[Ee]xport*", "*[Ss]tatement*"]
    extensions: [".csv"]
    destination: "4_Archives/banques/exports/{YYYY}"
    date_source: "file_modified"

  # Credit Agricole bank statements
  credit_agricole:
    patterns: ["Relevé n°*"]
    extensions: [".pdf"]
    destination: "4_Archives/banques/Credit Agricole/{YYYY}"
    date_source: "filename"
    date_pattern: "du (\\d{2})_(\\d{2})_(\\d{4})"

  # BCV bank documents
  bcv_avis:
    patterns: ["5429324*_*", "*_E310_*", "*_E100_*", "*_E204_*"]
    extensions: [".pdf"]
    destination: "4_Archives/banques/BCV/{YYYY}"
    date_source: "filename"
    date_pattern: "(\\d{4})-(\\d{2})-(\\d{2})"

  # Romande Energie invoices
  romande_energie:
    patterns: ["*romande-energie*", "*Romande*Energie*"]
    extensions: [".pdf"]
    destination: "4_Archives/factures/Energie/Romande Energie/{YYYY}"
    date_source: "filename"
    date_pattern: "(\\d{4})-(\\d{2})-(\\d{2})"

  # French real estate documents
  immobilier_france:
    patterns:
      [
        "*[Ss]afer*",
        "*SAFER*",
        "*[Nn]otaire*",
        "*acte*vente*",
        "*[Cc]adastre*",
        "*foncier*",
      ]
    extensions: [".pdf"]
    destination: "4_Archives/immobilier-france/{YYYY}"
    date_source: "file_modified"

  # French tax documents
  impots_france:
    patterns:
      [
        "Avis_d_impot_*",
        "Avis*impot*",
        "*impots.gouv*",
        "*impôts fonciers*",
        "*IMPÔTS LOCAUX*",
      ]
    extensions: [".pdf"]
    destination: "4_Archives/impots-france/{YYYY}"
    date_source: "filename"
    date_pattern: "(\\d{4})_sur_les_revenus"

  # French bank documents (IFU)
  banques_france:
    patterns: ["*E-IFU*", "*IFU*", "*revenus mobiliers*"]
    extensions: [".pdf"]
    destination: "4_Archives/banques-france/{YYYY}"
    date_source: "filename"
    date_pattern: "(\\d{4})"

  # Insurance claims
  assurances_sinistres:
    patterns:
      [
        "*[Dd]éclaration*accident*",
        "*[Dd]eclaration*accident*",
        "*sinistre*",
        "*[Cc]laim*",
      ]
    extensions: [".pdf"]
    destination: "4_Archives/assurances-sinistres/{YYYY}"
    date_source: "file_modified"

  # Health reimbursements
  sante_remboursement:
    patterns:
      [
        "*[Jj]ustificatif*[Rr]emboursement*",
        "*[Rr]emboursement*[Ss]anté*",
        "*M-Thérapies*",
      ]
    extensions: [".pdf"]
    destination: "4_Archives/sante/{YYYY}"
    date_source: "file_modified"
