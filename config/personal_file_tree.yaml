# personal_file_tree.yaml
# Structure PARA cible pour OneDrive Personnel
# Utilisé par MLX Semantic Router pour classification automatique
#
# Source: Analyse 142,218 fichiers OneDrive (2025-12-25)

version: "1.0"
generated: "2025-12-25"

# =============================================================================
# CONFIGURATION
# App settings - can be overridden by environment variables (PARA_FILES_*)
# =============================================================================
config:
  # Root directory for PARA folders (0_Inbox, 1_Projects, etc.)
  para_root: "~/OneDrive\ -\ Home/PARA"

  # Number of characters to extract for semantic matching
  content_preview_chars: 2000

  # MLX embedding model settings
  mlx:
    model_name: "nomic-text-v1.5"
    score_threshold: 0.75

  # LLM fallback settings (optional)
  llm:
    enabled: false
    model: "ollama/qwen2.5:1.5b"
    confidence_threshold: 0.6
    # api_base: "http://localhost:11434"

# =============================================================================
# RÈGLES DE ROUTAGE SPÉCIALES
# =============================================================================
routing_rules:
  # Photos et vidéos - UNIQUEMENT depuis Inbox
  # {location} est remplacé par le lieu (via GPS) si disponible, sinon ignoré
  photos:
    source: "0_Inbox" # Ne cherche que dans Inbox
    extensions: [".jpg", ".jpeg", ".png", ".heic", ".raw", ".cr2", ".nef"]
    destination: "4_Archives/photos/{YYYY}/{location}/{MM}/{DD}"
    date_source: "exif"
    fallback_date: "file_modified"

  videos:
    source: "0_Inbox" # Ne cherche que dans Inbox
    extensions: [".mp4", ".mov", ".avi", ".mkv"]
    destination: "4_Archives/videos/{YYYY}/{location}/{MM}/{DD}"
    date_source: "exif"
    fallback_date: "file_modified"

  screenshots:
    source: "0_Inbox"
    patterns: ["Screenshot*", "Capture*", "Screen Shot*"]
    destination: "4_Archives/photos/{YYYY}/{MM}/{DD}"
    date_source: "file_modified"

  # Formations → Archive, structure interne préservée
  courses:
    action: "preserve_structure"
    destination: "4_Archives/courses-completed/{platform}"
    platforms:
      coursera: ["*[Cc]oursera*"]
      linkedin-learning: ["*[Ll]inked[Ii]n*[Ll]earning*"]
      oreilly: ["*[Oo][Rr]eilly*"]
      udemy: ["*[Uu]demy*"]
      pluralsight: ["*[Pp]luralsight*"]
      datacamp: ["*[Dd]atacamp*"]

  # Dossiers génériques → Retour Inbox (contenu aplati)
  generic_folders:
    patterns: ["New Folder*", "Untitled*", "Sans titre*"]
    action: "flatten_to_inbox"

  # Programmes et installeurs
  programmes:
    extensions:
      [
        ".exe",
        ".msi",
        ".dmg",
        ".pkg",
        ".app",
        ".deb",
        ".rpm",
        ".appimage",
        ".snap",
        ".flatpak",
        ".jar",
        ".war",
        ".apk",
        ".ipa",
      ]
    destination: "4_Archives/programmes"

  # Images disque ISO
  isos:
    extensions:
      [
        ".iso",
        ".img",
        ".bin",
        ".cue",
        ".nrg",
        ".mdf",
        ".vhd",
        ".vhdx",
        ".vmdk",
        ".qcow2",
      ]
    destination: "4_Archives/isos"

  # Presentations - not invoices!
  presentations:
    extensions: [".pptx", ".ppt", ".key", ".odp"]
    destination: "3_Resources/documentation/presentations/{YYYY}"
    date_source: "file_modified"

# =============================================================================
# 0_INBOX - Point d'entrée PLAT
# =============================================================================
inbox:
  path: "0_Inbox"
  behavior: "flat"
  description: "Point d'entrée temporaire - AUCUN sous-dossier"
  utterances:
    - "nouveau fichier"
    - "téléchargement"
    - "à trier"
    - "temporary"

# =============================================================================
# 1_PROJECTS - Projets actifs avec deadline
# =============================================================================
projects:
  path: "1_Projects"

  routes:
    - name: "dell-customer-project"
      pattern: "1_Projects/dell-{customer}-{project}"
      utterances:
        - "projet client Dell"
        - "delivery"
        - "implementation"
        - "POC client"
        - "migration projet"
        - "RFP réponse"
        - "proposal"

    - name: "home-improvement"
      pattern: "1_Projects/renovation-{room}"
      utterances:
        - "rénovation"
        - "travaux maison"
        - "devis artisan"
        - "matériaux construction"

    - name: "tech-lab"
      pattern: "1_Projects/{name}"
      utterances:
        - "homelab"
        - "lab setup"
        - "configuration test"
        - "development project"

