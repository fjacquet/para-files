# personal_file_tree.yaml
# Configuration technique pour para-files
# Classification sémantique déléguée à config/documents.json et config/thema.json
#
# Version 2.0 - Simplified (2025-12-28)

version: "2.0"
generated: "2025-12-28"

# =============================================================================
# CONFIGURATION
# App settings - can be overridden by environment variables (PARA_FILES_*)
# =============================================================================
config:
  # Root directory for PARA folders (0_Inbox, 1_Projects, etc.)
  para_root: "~/OneDrive - Home/PARA"

  # Number of characters to extract for semantic matching
  content_preview_chars: 2000

  # Taxonomy sources (new in v2.0)
  taxonomy:
    documents_path: "config/documents.json"
    thema_path: "config/thema.json"

  # MLX settings (all models via mlx-lm, no external server needed)
  mlx:
    # Embedding model for semantic matching
    embedding_model: "nomic-text-v1.5"
    score_threshold: 0.75

    # LLM fallback (native MLX, no Ollama required)
    llm_enabled: false
    llm_model: "mlx-community/Qwen2.5-1.5B-Instruct-4bit"
    llm_confidence: 0.6

# mlx-community/phi-4-4bit (Très bon modèle généraliste, mais moins performant que les suivants)
# mlx-community/Qwen2.5-1.5B-Instruct-4bit" (Bon modèle généraliste, léger et rapide)
# mlx-community/Llama-3.1-8B-Instruct-4bit (Le plus populaire, excellent partout)
# mlx-community/Mistral-7B-Instruct-v0.3-4bit (Très fiable, une valeur sûre)
# mlx-community/gemma-2-9b-it-4bit (Le modèle de Google, excellent en français et rédaction)
# mlx-community/Qwen2.5-Coder-7B-Instruct-4bit (Actuellement le roi du code en petite taille)
# mlx-community/DeepSeek-Coder-V2-Lite-Instruct-4bit (Excellent pour le Python et le Web)

# =============================================================================
# ROUTING RULES - Technical patterns by extension/filename
# Documents classification is now in config/documents.json
# =============================================================================
routing_rules:
  # Photos - Route by EXIF date and GPS location
  photos:
    source: "0_Inbox"
    extensions:
      [".jpg", ".jpeg", ".png", ".heic", ".raw", ".cr2", ".nef", ".dng"]
    destination: "4_Archives/photos/{YYYY}/{country}/{location}/{MM}/{DD}"
    date_source: "exif"
    fallback_date: "file_modified"

  # Videos - Route by EXIF date and GPS location
  videos:
    source: "0_Inbox"
    extensions: [".mp4", ".mov", ".avi", ".mkv"]
    destination: "4_Archives/videos/{YYYY}/{country}/{location}/{MM}/{DD}"
    date_source: "exif"
    fallback_date: "file_modified"

  # Screenshots - Route by file date
  screenshots:
    source: "0_Inbox"
    patterns: ["Screenshot*", "Capture*", "Screen Shot*"]
    destination: "4_Archives/photos/{YYYY}/{MM}/{DD}"
    date_source: "file_modified"

  # Online courses - Preserve platform structure
  courses:
    action: "preserve_structure"
    destination: "4_Archives/courses-completed/{platform}"
    platforms:
      coursera: ["*[Cc]oursera*"]
      linkedin-learning: ["*[Ll]inked[Ii]n*[Ll]earning*"]
      oreilly: ["*[Oo][Rr]eilly*"]
      udemy: ["*[Uu]demy*"]
      pluralsight: ["*[Pp]luralsight*"]
      datacamp: ["*[Dd]atacamp*"]

  # Generic folders - Flatten to inbox
  generic_folders:
    patterns: ["New Folder*", "Untitled*", "Sans titre*"]
    action: "flatten_to_inbox"

  # Programs and installers
  programmes:
    extensions:
      [
        ".exe",
        ".msi",
        ".dmg",
        ".pkg",
        ".app",
        ".deb",
        ".rpm",
        ".appimage",
        ".snap",
        ".flatpak",
        ".jar",
        ".war",
        ".apk",
        ".ipa",
      ]
    destination: "4_Archives/programmes"

  # Disk images
  isos:
    extensions:
      [
        ".iso",
        ".img",
        ".bin",
        ".cue",
        ".nrg",
        ".mdf",
        ".vhd",
        ".vhdx",
        ".vmdk",
        ".qcow2",
      ]
    destination: "4_Archives/isos"

  # Presentations (not invoices)
  presentations:
    extensions: [".pptx", ".ppt", ".key", ".odp"]
    destination: "3_Resources/documentation/presentations/{YYYY}"
    date_source: "file_modified"

  # Ebooks - Route to livres (Thema classification via thema.json)
  ebooks:
    extensions: [".epub", ".mobi", ".azw", ".azw3"]
    destination: "3_Resources/livres/{YYYY}"
