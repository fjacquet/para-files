# personal_file_tree.yaml
# Structure PARA cible pour OneDrive Personnel
# Utilisé par MLX Semantic Router pour classification automatique
#
# Source: Analyse 142,218 fichiers OneDrive (2025-12-25)

version: "1.0"
generated: "2025-12-25"

# =============================================================================
# RÈGLES DE ROUTAGE SPÉCIALES
# =============================================================================
routing_rules:
  # Photos et vidéos - UNIQUEMENT depuis Inbox
  photos:
    source: "0_Inbox" # Ne cherche que dans Inbox
    extensions: [".jpg", ".jpeg", ".png", ".heic", ".raw", ".cr2", ".nef"]
    destination: "4_Archives/photos/{YYYY}/{MM}/{DD}"
    date_source: "exif"
    fallback_date: "file_modified"

  videos:
    source: "0_Inbox" # Ne cherche que dans Inbox
    extensions: [".mp4", ".mov", ".avi", ".mkv"]
    destination: "4_Archives/photos/{YYYY}/{MM}/{DD}"
    date_source: "exif"
    fallback_date: "file_modified"

  screenshots:
    source: "0_Inbox"
    patterns: ["Screenshot*", "Capture*", "Screen Shot*"]
    destination: "4_Archives/photos/{YYYY}/{MM}/{DD}"
    date_source: "file_modified"

  # Formations → Archive, structure interne préservée
  courses:
    action: "preserve_structure"
    destination: "4_Archives/courses-completed/{platform}"
    platforms:
      coursera: ["*[Cc]oursera*"]
      linkedin-learning: ["*[Ll]inked[Ii]n*[Ll]earning*"]
      oreilly: ["*[Oo][Rr]eilly*"]
      udemy: ["*[Uu]demy*"]
      pluralsight: ["*[Pp]luralsight*"]
      datacamp: ["*[Dd]atacamp*"]

  # Dossiers génériques → Retour Inbox (contenu aplati)
  generic_folders:
    patterns: ["New Folder*", "Untitled*", "Sans titre*"]
    action: "flatten_to_inbox"

# =============================================================================
# 0_INBOX - Point d'entrée PLAT
# =============================================================================
inbox:
  path: "0_Inbox"
  behavior: "flat"
  description: "Point d'entrée temporaire - AUCUN sous-dossier"
  utterances:
    - "nouveau fichier"
    - "téléchargement"
    - "à trier"
    - "temporary"

# =============================================================================
# 1_PROJECTS - Projets actifs avec deadline
# =============================================================================
projects:
  path: "1_Projects"

  routes:
    - name: "dell-customer-project"
      pattern: "1_Projects/dell-{customer}-{project}"
      utterances:
        - "projet client Dell"
        - "delivery"
        - "implementation"
        - "POC client"
        - "migration projet"
        - "RFP réponse"
        - "proposal"

    - name: "home-improvement"
      pattern: "1_Projects/renovation-{room}"
      utterances:
        - "rénovation"
        - "travaux maison"
        - "devis artisan"
        - "matériaux construction"

    - name: "tech-lab"
      pattern: "1_Projects/{name}"
      utterances:
        - "homelab"
        - "lab setup"
        - "configuration test"
        - "development project"

# =============================================================================
# 2_AREAS - Responsabilités continues (suivi actif)
# =============================================================================
areas:
  path: "2_Areas"

  routes:
    # --- Dell Work ---
    - name: "dell-customers"
      pattern: "2_Areas/dell/customers/{sector}/{customer}"
      utterances:
        - "suivi client"
        - "account management"
        - "relationship ongoing"

    - name: "dell-competitive"
      pattern: "2_Areas/dell/competitive"
      utterances:
        - "battlecard"
        - "analyse concurrence"
        - "HPE vs Dell"
        - "NetApp comparaison"

    - name: "dell-team"
      pattern: "2_Areas/dell/team"
      utterances:
        - "équipe"
        - "management"
        - "1on1"
        - "performance review"

    # --- Finances courantes (pas les factures archivées) ---
    - name: "finances-banques"
      pattern: "2_Areas/finances/banques/{bank}"
      utterances:
        - "compte courant"
        - "gestion compte"
        - "IBAN actif"

    - name: "finances-investissements"
      pattern: "2_Areas/finances/investissements"
      utterances:
        - "portfolio actif"
        - "trading"
        - "ETF suivi"

    # --- Photography (pratique active) ---
    - name: "photography"
      pattern: "2_Areas/photography"
      utterances:
        - "lightroom preset"
        - "workflow photo"
        - "matériel actuel"

# =============================================================================
