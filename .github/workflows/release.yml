name: Release

# Trigger: push a semver tag, e.g.:
#   git tag v0.2.0 && git push --tags
#
# Before tagging, update both:
#   - pyproject.toml             → version = "x.y.z"
#   - src/para_files/__init__.py → __version__ = "x.y.z"

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install CLI dependencies
        run: brew install pandoc exiftool

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -m "not slow" -q

  # ── 2. Build wheel + sdist ─────────────────────────────────────────────────
  build:
    runs-on: macos-14
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 3. GitHub Release ──────────────────────────────────────────────────────
  github-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  # ── 4. Update Homebrew formula ─────────────────────────────────────────────
  update-formula:
    runs-on: ubuntu-latest
    needs: github-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: maincd
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute source tarball SHA256
        id: sha
        run: |
          SHA256=$(curl -sL \
            "https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz" \
            | sha256sum | cut -d' ' -f1)
          echo "value=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Patch formula url and sha256
        run: |
          sed -i \
            's|url "[^"]*"|url "https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"|' \
            Formula/para-files.rb
          sed -i \
            's|sha256 "[^"]*"|sha256 "${{ steps.sha.outputs.value }}"|' \
            Formula/para-files.rb

      - name: Commit and push formula update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/para-files.rb
          git diff --staged --quiet && exit 0
          git commit -m "chore: update Homebrew formula for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:maincd
